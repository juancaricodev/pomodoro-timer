schema: spec-driven

context: |
  Tech stack: Vite 8 + React 19 + TypeScript 6 + Vitest 3
  Architecture: SPA with custom hooks for state management
  Testing: Vitest + @testing-library/react + @testing-library/jest-dom + jsdom
  Linting: ESLint with typescript-eslint
  Type checking: tsc -b --noEmit

strict_tdd: true

testing:
  strict_tdd: true
  detected: "2026-06-11"

  test_runner:
    command: vitest run --config vitest.config.ts
    framework: vitest

  test_layers:
    unit:
      available: true
      tool: vitest + @testing-library/react
    integration:
      available: true
      tool: vitest + @testing-library/react + jsdom
    e2e:
      available: false
      tool: —

  coverage:
    available: false
    command: —

  quality_tools:
    linter:
      available: true
      command: eslint .
    type_checker:
      available: true
      command: tsc -b --noEmit
    formatter:
      available: false
      command: —

rules:
  proposal:
    - Include rollback plan for risky changes
    - Identify affected modules/packages
  specs:
    - Use Given/When/Then format for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
  tasks:
    - Group tasks by phase (infrastructure, implementation, testing)
    - Use hierarchical numbering (1.1, 1.2, etc.)
    - Keep tasks small enough to complete in one session
  apply:
    - Follow existing code patterns and conventions
    - Load relevant coding skills for the project stack
  verify:
    - Run tests if test infrastructure exists
    - Compare implementation against every spec scenario
  archive:
    - Warn before merging destructive deltas (large removals)
